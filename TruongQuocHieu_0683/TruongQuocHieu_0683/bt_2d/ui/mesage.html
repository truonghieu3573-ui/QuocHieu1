<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diffie-Hellman & AES Chat</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: rgba(30, 30, 30, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-gradient: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            --message-sent: linear-gradient(135deg, #f12711 0%, #f5af19 100%);
            --message-received: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --success: #4cd964;
            --error: #ff3b30;
            --glow: 0 0 20px rgba(241, 39, 17, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(241, 39, 17, 0.15), transparent 30%),
                radial-gradient(circle at 80% 20%, rgba(245, 175, 25, 0.15), transparent 30%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-app {
            width: 100%;
            max-width: 850px;
            height: 88vh;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.6s ease-out;
        }

        .chat-header {
            padding: 20px 35px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px 30px 0 0;
        }

        .title-area {
            display: flex;
            flex-direction: column;
        }

        .title-area h2 {
            font-size: 1.4rem;
            font-weight: 600;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            font-size: 0.85rem;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            font-weight: 500;
        }

        .status.error {
            color: var(--error);
        }

        .indicator {
            width: 10px;
            height: 10px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--success);
            animation: breathe 2s infinite;
        }

        .status.error .indicator {
            background-color: var(--error);
            box-shadow: 0 0 12px var(--error);
        }

        .chat-body {
            flex-grow: 1;
            padding: 30px 35px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .chat-body::-webkit-scrollbar {
            width: 6px;
        }
        .chat-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 14px 22px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            word-wrap: break-word;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .msg-received {
            align-self: flex-start;
            background: var(--message-received);
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .msg-sent {
            align-self: flex-end;
            background: var(--message-sent);
            color: #fff;
            font-weight: 500;
            border-bottom-right-radius: 5px;
            box-shadow: var(--glow);
        }

        .msg-system {
            align-self: center;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 30px;
            max-width: 85%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-footer {
            padding: 20px 35px;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0 0 30px 30px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-group {
            flex-grow: 1;
            position: relative;
        }

        #chat-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            padding: 16px 25px;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        #chat-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(245, 175, 25, 0.6);
            box-shadow: 0 0 15px rgba(245, 175, 25, 0.2);
        }

        #chat-input::placeholder {
            color: var(--text-secondary);
        }

        #btn-send {
            background: var(--primary-gradient);
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--glow);
            flex-shrink: 0;
            color: #fff;
        }

        #btn-send:hover {
            transform: scale(1.08);
        }

        #btn-send:active {
            transform: scale(0.95);
        }

        #btn-send svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            margin-left: 2px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

    </style>
</head>
<body>

    <div class="chat-app">
        <!-- Header -->
        <div class="chat-header">
            <div class="title-area">
                <h2>Diffie-Hellman & AES Chat</h2>
                <div class="status" id="conn-status">
                    <div class="indicator"></div>
                    <span id="conn-text">Connecting...</span>
                </div>
            </div>
            <!-- Key Icon -->
            <div>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
                </svg>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-body" id="chat-body">
            <!-- Messages go here -->
        </div>

        <!-- Input Area -->
        <div class="chat-footer">
            <div class="input-group">
                <input type="text" id="chat-input" placeholder="Type an encrypted message..." autocomplete="off">
            </div>
            <button id="btn-send">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Socket.IO Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const socket = io();
            
            const chatBody = document.getElementById('chat-body');
            const chatInput = document.getElementById('chat-input');
            const btnSend = document.getElementById('btn-send');
            const connStatus = document.getElementById('conn-status');
            const connText = document.getElementById('conn-text');

            // Scroll to bottom helper
            const scrollToBottom = () => {
                chatBody.scrollTop = chatBody.scrollHeight;
            };

            // Add message to chat body
            const addMessage = (text, type) => {
                const div = document.createElement('div');
                div.classList.add('msg-bubble');
                if (type === 'sent') div.classList.add('msg-sent');
                else if (type === 'received') div.classList.add('msg-received');
                else if (type === 'system') div.classList.add('msg-system');
                
                div.textContent = text;
                chatBody.appendChild(div);
                scrollToBottom();
            };

            // Socket Events
            socket.on('connect', () => {
                connStatus.classList.remove('error');
                connText.textContent = 'Secured via DH-AES';
            });

            socket.on('disconnect', () => {
                connStatus.classList.add('error');
                connText.textContent = 'Disconnected';
                addMessage('Connection lost.', 'system');
            });

            socket.on('system_message', (data) => {
                addMessage(data.message, 'system');
                if (data.message.toLowerCase().includes('failed') || data.message.toLowerCase().includes('offline')) {
                    connStatus.classList.add('error');
                    connText.textContent = 'Server offline';
                }
            });

            socket.on('receive_message', (data) => {
                addMessage(data.message, 'received');
            });

            // Send Message logic
            const sendMessage = () => {
                const text = chatInput.value.trim();
                if (text) {
                    addMessage(text, 'sent');
                    socket.emit('send_message', { message: text });
                    chatInput.value = '';
                }
            };

            btnSend.addEventListener('click', sendMessage);

            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // Auto focus input
            chatInput.focus();
        });
    </script>
</body>
</html>
