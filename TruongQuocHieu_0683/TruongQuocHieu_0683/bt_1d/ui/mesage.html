<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Chat - AES & RSA</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --panel-bg: rgba(20, 20, 30, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --message-sent: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --message-received: rgba(255, 255, 255, 0.06);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
            --glow: 0 0 20px rgba(79, 172, 254, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.15), transparent 25%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-app {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.5s ease-out;
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px 24px 0 0;
        }

        .title-area {
            display: flex;
            flex-direction: column;
        }

        .title-area h2 {
            font-size: 1.25rem;
            font-weight: 600;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .status {
            font-size: 0.8rem;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            font-weight: 500;
        }

        .status.error {
            color: var(--error);
        }

        .indicator {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: breathe 2s infinite;
        }

        .status.error .indicator {
            background-color: var(--error);
            box-shadow: 0 0 10px var(--error);
        }

        .chat-body {
            flex-grow: 1;
            padding: 25px 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-body::-webkit-scrollbar {
            width: 5px;
        }
        .chat-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .msg-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .msg-received {
            align-self: flex-start;
            background: var(--message-received);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .msg-sent {
            align-self: flex-end;
            background: var(--message-sent);
            color: #000;
            font-weight: 500;
            border-bottom-right-radius: 4px;
            box-shadow: var(--glow);
        }

        .msg-system {
            align-self: center;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 20px;
            max-width: 80%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-footer {
            padding: 20px 30px;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0 0 24px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-group {
            flex-grow: 1;
            position: relative;
        }

        #chat-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 14px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        #chat-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(79, 172, 254, 0.5);
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.15);
        }

        #chat-input::placeholder {
            color: var(--text-secondary);
        }

        #btn-send {
            background: var(--primary-gradient);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--glow);
            flex-shrink: 0;
            color: #000;
        }

        #btn-send:hover {
            transform: scale(1.05);
        }

        #btn-send:active {
            transform: scale(0.95);
        }

        #btn-send svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            margin-left: 2px;
        }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

    </style>
</head>
<body>

    <div class="chat-app">
        <!-- Header -->
        <div class="chat-header">
            <div class="title-area">
                <h2>AES-RSA Secure Chat</h2>
                <div class="status" id="conn-status">
                    <div class="indicator"></div>
                    <span id="conn-text">Connecting...</span>
                </div>
            </div>
            <!-- Lock Icon -->
            <div>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-body" id="chat-body">
            <!-- Messages go here -->
        </div>

        <!-- Input Area -->
        <div class="chat-footer">
            <div class="input-group">
                <input type="text" id="chat-input" placeholder="Type a secure message..." autocomplete="off">
            </div>
            <button id="btn-send">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Socket.IO Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const socket = io();
            
            const chatBody = document.getElementById('chat-body');
            const chatInput = document.getElementById('chat-input');
            const btnSend = document.getElementById('btn-send');
            const connStatus = document.getElementById('conn-status');
            const connText = document.getElementById('conn-text');

            // Scroll to bottom helper
            const scrollToBottom = () => {
                chatBody.scrollTop = chatBody.scrollHeight;
            };

            // Add message to chat body
            const addMessage = (text, type) => {
                const div = document.createElement('div');
                div.classList.add('msg-bubble');
                if (type === 'sent') div.classList.add('msg-sent');
                else if (type === 'received') div.classList.add('msg-received');
                else if (type === 'system') div.classList.add('msg-system');
                
                div.textContent = text;
                chatBody.appendChild(div);
                scrollToBottom();
            };

            // Socket Events
            socket.on('connect', () => {
                connStatus.classList.remove('error');
                connText.textContent = 'Connected securely';
            });

            socket.on('disconnect', () => {
                connStatus.classList.add('error');
                connText.textContent = 'Disconnected';
                addMessage('Connection lost.', 'system');
            });

            socket.on('system_message', (data) => {
                addMessage(data.message, 'system');
                if (data.message.toLowerCase().includes('failed') || data.message.toLowerCase().includes('offline')) {
                    connStatus.classList.add('error');
                    connText.textContent = 'Server offline';
                }
            });

            socket.on('receive_message', (data) => {
                addMessage(data.message, 'received');
            });

            // Send Message logic
            const sendMessage = () => {
                const text = chatInput.value.trim();
                if (text) {
                    addMessage(text, 'sent');
                    socket.emit('send_message', { message: text });
                    chatInput.value = '';
                }
            };

            btnSend.addEventListener('click', sendMessage);

            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // Auto focus input
            chatInput.focus();
        });
    </script>
</body>
</html>
